name: "Stirling-PDF Fat"
slug: stirling_pdf_fat
description: "Stirling-PDF Fat — all Full features plus additional fonts and pre-bundled jar security. OCR, LibreOffice, Ghostscript, ImageMagick. Larger image (~4 GB)."
version: "2.11.0"
url: "https://github.com/ToledoEM/Stirling-PDF-HA_app/tree/main/stirling_pdf_fat"
arch:
  - amd64
  - aarch64
startup: application
init: false

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Stirling-PDF Web UI"

webui: "http://[HOST]:[PORT:8080]"

map:
  - addon_config:rw
  - share:rw
  - media:rw

memory: 4096

options:
  enable_login: false
  langs: "en_GB"
  log_level: "info"

schema:
  enable_login: bool
  langs: str
  log_level: list(info|debug|warn|error)
