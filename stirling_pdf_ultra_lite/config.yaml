name: "Stirling-PDF Ultra-Lite"
slug: stirling_pdf_ultra_lite
description: "Stirling-PDF Ultra-Lite — minimal install with core PDF operations: merge, split, rotate, convert, password protection. Smallest image."
version: "2.11.0"
url: "https://github.com/ToledoEM/Stirling-PDF-HA_app/tree/main/stirling_pdf_ultra_lite"
arch:
  - amd64
  - aarch64
startup: application
init: false

ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "Stirling-PDF Web UI"

webui: "http://[HOST]:[PORT:8080]"

map:
  - addon_config:rw
  - share:rw
  - media:rw

memory: 1024

options:
  enable_login: false
  langs: "en_GB"
  log_level: "info"

schema:
  enable_login: bool
  langs: str
  log_level: list(info|debug|warn|error)
